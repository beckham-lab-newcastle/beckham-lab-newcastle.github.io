pi:
  - name: Dr Kate Beckham
    role: Royal Society URF · NuAcT Fellow · Group Leader
    photo: kate-beckham.jpg
    bio: >-
      Kate is a structural biologist studying how bacteria assemble and cross
      their cell envelope. She holds a Royal Society University Research
      Fellowship in the Newcastle University Biosciences Institute, where she
      leads an independent group on mycobacterial secretion systems and
      outer-membrane transport proteins. Before Newcastle she was a Staff
      Scientist and postdoctoral fellow at EMBL Hamburg (2014–2023), following a
      PhD in Molecular Microbiology at the University of Glasgow and a degree in
      Molecular Biology at the University of St Andrews. Her work combines
      cryo-EM, microbiology and biochemistry to turn structures into mechanism.
    links:
      - label: Google Scholar
        url: https://scholar.google.com/citations?user=end6XcEAAAAJ&hl=en
      - label: Bluesky
        url: https://bsky.app/profile/kshbeckham.bsky.social

