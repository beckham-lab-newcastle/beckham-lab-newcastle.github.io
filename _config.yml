title: Beckham Lab
tagline: "How bacteria build and cross the membranes that keep them alive"
description: >-
  The Beckham Lab at Newcastle University uses cryo-EM to reveal the transport
  machinery of the bacterial cell envelope — and how pathogens exploit it.

